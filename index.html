<div class="screen active" id="gate">

// ── TARİX ─────────────────────────────────────────────────────────────────────
function getWD(){
  const n=new Date(),d=new Date(n);
  if(n.getHours()<17)d.setDate(d.getDate()-1);
  return d;
}
// 4 period: günlük, cari ay, keçən ilin eyni ayı, 2 il əvvəl eyni ay
// Hər period üçün: {label, storeKey, cacheKey}
function getPeriods(){
  const d=getWD();
  const yr=d.getFullYear(), mo=d.getMonth(), day=d.getDate();
  const ayAd=AY[mo];
  return [
    {
      id:'gun',
      label:`${day} ${ayAd} ${yr}`,
      sk:`G_${yr}_${String(mo+1).padStart(2,'0')}_${String(day).padStart(2,'0')}`,
      ck:`G_${yr}_${String(mo+1).padStart(2,'0')}_${String(day).padStart(2,'0')}`
    },
    {
      id:'ay0',
      label:`1-${day} ${ayAd} ${yr}`,
      sk:`A_${yr}_${String(mo+1).padStart(2,'0')}`,
      ck:`A_${yr}_${String(mo+1).padStart(2,'0')}`
    },
    {
      id:'ay1',
      label:`1-${day} ${AY[mo]} ${yr-1}`,
      sk:`A_${yr-1}_${String(mo+1).padStart(2,'0')}`,
      ck:`A_${yr-1}_${String(mo+1).padStart(2,'0')}`
    },
    {
      id:'ay2',
      label:`1-${day} ${AY[mo]} ${yr-2}`,
      sk:`A_${yr-2}_${String(mo+1).padStart(2,'0')}`,
      ck:`A_${yr-2}_${String(mo+1).padStart(2,'0')}`
    }
  ];
}
function dLeft(){const d=getWD();return Math.max(0,new Date(d.getFullYear(),d.getMonth()+1,0).getDate()-d.getDate());}
function daysPassed(){return Math.max(1,getWD().getDate());}
function fmtDate(){const d=getWD();return d.toLocaleDateString('az-AZ',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}

// ── FORMAT ────────────────────────────────────────────────────────────────────
function fmt(n){
  if(!n||n==0)return '—';
  return Number(n).toLocaleString('az-AZ',{minimumFractionDigits:0,maximumFractionDigits:0}).replace(/\./g,',');
}
function xPct(v,t){
  if(!v||!t)return null;
  const r=v/t*100;
  return r>=100?100:Math.floor(r*10)/10;
}
function pStr(p){if(p===null)return '—';return p===100?'100%':p.toFixed(1)+'%';}
function pCls(p){if(p===null)return '';if(p>=100)return 'pct-done';if(p>=70)return 'pct-mid';return 'pct-low';}
function avgPct(arr){const v=arr.filter(x=>x>0);return v.length?v.reduce((a,b)=>a+b)/v.length:null;}
function fmtP(p){return p===null?'—':p.toFixed(1)+'%';}

// ── CACHE ─────────────────────────────────────────────────────────────────────
function ckGet(sid,pck){try{return JSON.parse(localStorage.getItem(`panda_${sid}_${pck}`)||'null');}catch{return null;}}
function ckSet(sid,pck,d){localStorage.setItem(`panda_${sid}_${pck}`,JSON.stringify(d));}

// ── MAĞAZA FORMU ──────────────────────────────────────────────────────────────
function planCard(sid,curMs){
  const t=gT()[sid];if(!t)return '';
  const dl=dLeft();
  const periods=getPeriods();
  const tv=ckGet(sid,periods[0].ck)?.satis||0;
  const pm=xPct(curMs,t.min);
  const pd=curMs>=t.min?xPct(curMs,t.mid):null;
  const px=curMs>=t.mid?xPct(curMs,t.max):null;
  let at,rm;
  if(curMs<t.min){at=t.min;rm=t.min-curMs;}
  else if(curMs<t.mid){at=t.mid;rm=t.mid-curMs;}
  else if(curMs<t.max){at=t.max;rm=t.max-curMs;}
  else{at=t.max;rm=0;}
  const ap=xPct(curMs,at)||0;
  const dn=dl>0&&rm>0?Math.ceil(rm/dl):0;
  const bc=curMs>=t.max?'#10b981':curMs>=t.mid?'#3b82f6':curMs>=t.min?'#f59e0b':'#ef4444';
  return `<div class="plan-card" id="pc-${sid}">
    <div class="plan-title">📊 Bu Ay Hədəflər</div>
    <div class="plan-grid">
      <div class="plan-item ${pm!==null&&pm>=100?'done':'active'}">
        <div class="pil">🥉 Min</div><div class="piv">${fmt(t.min)}</div>
        <div class="pip ${pm!==null&&pm>=100?'done':'cur'}">${pStr(pm)}</div>
      </div>
      <div class="plan-item ${pd!==null&&pd>=100?'done':pm!==null&&pm>=100?'active':''}">
        <div class="pil">🥈 Orta</div><div class="piv">${fmt(t.mid)}</div>
        <div class="pip ${pd!==null&&pd>=100?'done':'cur'}">${pd!==null?pStr(pd):'—'}</div>
      </div>
      <div class="plan-item ${px!==null&&px>=100?'done':pd!==null&&pd>=100?'active':''}">
        <div class="pil">🥇 Maks</div><div class="piv">${fmt(t.max)}</div>
        <div class="pip ${px!==null&&px>=100?'done':'cur'}">${px!==null?pStr(px):'—'}</div>
      </div>
    </div>
    <div class="ppl"><span>Cari: ${fmt(curMs)} ₼</span><strong>${fmt(at)} — ${ap===100?'100':ap.toFixed(1)}%</strong></div>
    <div class="pbw"><div class="pb" style="width:${Math.min(100,ap)}%;background:${bc}"></div></div>
    <div class="psg">
      <div class="ps"><div class="psl">📅 Qalan gün</div><div class="psv">${dl}</div></div>
      <div class="ps"><div class="psl">💰 Gündəlik lazım</div><div class="psv">${rm>0?fmt(dn)+' ₼':'✅'}</div></div>
      <div class="ps"><div class="psl">📈 Bu gün</div><div class="psv">${fmt(tv)} ₼</div></div>
      <div class="ps"><div class="psl">⬆️ Növbəti hədəfə</div><div class="psv">${rm>0?fmt(rm)+' ₼':'🏆'}</div></div>
    </div>
  </div>`;
}

function renderForm(sid){
  const u=gU().find(u=>u.id===sid);
  const isSaxa=!u.inTotal;
  const periods=getPeriods();
  const activePeriods=isSaxa?periods.slice(0,2):periods;
  document.getElementById('sf-title').textContent=u.name;
  document.getElementById('sf-date').textContent=fmtDate();
  const body=document.getElementById('sf-body');
  const allSaved=!editMode&&activePeriods.every(p=>ckGet(sid,p.ck)!==null);
  const msData=ckGet(sid,periods[1].ck);
  const ms=msData?.satis||0;
  const t=gT()[sid];
  const PCOL=['#2E75B6','#C55A11','#375623','#7030A0'];
  let h=t?planCard(sid,ms):'';
  activePeriods.forEach((period,pi)=>{
    const saved=editMode?null:ckGet(sid,period.ck);
    const cv=ckGet(sid,period.ck);
    const dis=(!editMode&&saved)?'disabled':'';
    const sv=editMode&&cv?cv.satis:(saved?.satis??'');
    const mv=editMode&&cv?cv.menfeet:(saved?.menfeet??'');
    const fv=editMode&&cv?cv.faiz:(saved?.faiz??'');
    const isAy=period.id==='ay0',isGun=period.id==='gun';
    const lu=isAy?`oninput="upPlan(this.value);sF('s-${period.id}')"`
      :isGun?`oninput="upToday();sF('s-${period.id}')"`
      :`oninput="sF('s-${period.id}')"`;
    h+=`<div class="period-block">
      <div class="period-hdr" style="background:${PCOL[pi]}">${period.label}</div>
      <table class="pt"><thead><tr>
        <th style="text-align:left">Göstərici</th><th>Satış (₼)</th><th>Mənfəət (₼)</th><th>Faiz (%)</th>
      </tr></thead><tbody><tr>
        <td class="pn">Ümumi satış</td>
        <td><input class="ni" type="number" min="0" id="s-${period.id}" value="${sv}" placeholder="0" ${dis} ${lu}>${sv?`<div class="nid">${fmt(sv)}</div>`:''}</td>
        <td><input class="ni" type="number" min="0" id="m-${period.id}" value="${mv}" placeholder="0" ${dis} oninput="sF('m-${period.id}')">${mv?`<div class="nid">${fmt(mv)}</div>`:''}</td>
        <td><input class="ni-f" type="number" min="0" step="0.1" id="f-${period.id}" value="${fv}" placeholder="0" ${dis}></td>
      </tr></tbody></table>
    </div>`;
  });
  if(allSaved){
    h+=`<button class="save-btn" disabled>✓ Saxlanıldı</button>
    <button class="edit-btn" id="ebt" onclick="enableEdit()">✏️ Düzəliş et</button>
    <div class="ok-box show">✅ Bu günün məlumatları saxlanıldı.</div>`;
  }else{
    h+=`<button class="save-btn" id="sbt" onclick="doSave()">✓ Yadda Saxla</button>
    <div class="ld-box" id="ldb">⏳ Göndərilir...</div>
    <div class="ok-box" id="okb">✅ Uğurla saxlandı!</div>
    <div class="er-box" id="erb">❌ Xəta baş verdi.</div>`;
  }
  body.innerHTML=h;goTo('store-form');
}

function sF(id){
  const inp=document.getElementById(id);if(!inp)return;
  const v=parseFloat(inp.value)||0;
  let d=document.getElementById('d_'+id);
  if(!d){d=document.createElement('div');d.id='d_'+id;d.className='nid';inp.parentNode.appendChild(d);}
  d.textContent=v>0?fmt(v):'';
}
function upPlan(v){
  const h=planCard(curSid,parseFloat(v)||0);
  const el=document.getElementById(`pc-${curSid}`);
  if(el){const t=document.createElement('div');t.innerHTML=h;el.replaceWith(t.firstElementChild);}
}
function upToday(){
  const periods=getPeriods();
  const ms=parseFloat(document.getElementById('s-ay0')?.value)||ckGet(curSid,periods[1].ck)?.satis||0;
  upPlan(ms);
}
function enableEdit(){
  editMode=true;renderForm(curSid);
  setTimeout(()=>{
    document.querySelectorAll('.ni,.ni-f').forEach(i=>i.disabled=false);
    const sb=document.getElementById('sbt');if(sb){sb.disabled=false;sb.textContent='✓ Yadda Saxla';}
    const eb=document.getElementById('ebt');if(eb)eb.style.display='none';
    document.querySelectorAll('.ok-box').forEach(b=>b.classList.remove('show'));
  },50);
}

// ── BİN ───────────────────────────────────────────────────────────────────────
async function rBin(){
  try{const r=await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY,'X-Bin-Meta':'false'}});if(!r.ok)return[];const j=await r.json();return j.data||[];}
  catch{return[];}
}
async function wBin(data){
  try{await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY,'X-Bin-Meta':'false'},body:JSON.stringify({data})});}
  catch(e){console.error(e);}
}

async function doSave(){
  const sid=curSid;
  const u=gU().find(u=>u.id===sid);
  const isSaxa=!u.inTotal;
  const periods=getPeriods();
  const activePeriods=isSaxa?periods.slice(0,2):periods;
  const res={};let any=false;
  for(const p of activePeriods){
    const s=parseFloat(document.getElementById(`s-${p.id}`)?.value)||0;
    const m=parseFloat(document.getElementById(`m-${p.id}`)?.value)||0;
    const f=parseFloat(document.getElementById(`f-${p.id}`)?.value)||0;
    if(s>0||m>0||f>0)any=true;
    res[p.id]={satis:s,menfeet:m,faiz:f,_sk:p.sk,_ck:p.ck};
  }
  if(!any){alert('Ən azı bir rəqəm daxil edin.');return;}
  document.getElementById('sbt').disabled=true;
  document.getElementById('ldb').classList.add('show');
  document.getElementById('erb').classList.remove('show');
  try{
    const all=await rBin();
    for(const pid of Object.keys(res)){
      const d=res[pid];
      const idx=all.findIndex(r=>r.sobe===u.name&&r.period===d._sk);
      const e={sobe:u.name,period:d._sk,satis:d.satis,menfeet:d.menfeet,faiz:d.faiz};
      if(idx>=0)all[idx]=e;else all.push(e);
      ckSet(sid,d._ck,{satis:d.satis,menfeet:d.menfeet,faiz:d.faiz});
    }
    await wBin(all);
    editMode=false;
    document.getElementById('ldb').classList.remove('show');
    document.getElementById('okb').classList.add('show');
    document.getElementById('sbt').textContent='✓ Saxlanıldı';
    document.querySelectorAll('.ni,.ni-f').forEach(i=>i.disabled=true);
    const sb=document.getElementById('sbt');
    if(sb){const eb=document.createElement('button');eb.className='edit-btn';eb.textContent='✏️ Düzəliş et';eb.onclick=enableEdit;sb.parentNode.insertBefore(eb,sb.nextSibling);}
    const ms=res['ay0']?.satis||0;upPlan(ms);
  }catch{
    document.getElementById('ldb').classList.remove('show');
    document.getElementById('erb').classList.add('show');
    document.getElementById('sbt').disabled=false;
  }
}

// ── OX ────────────────────────────────────────────────────────────────────────
function arrD(ds,ms,minT,dl){
  if(!ds)return '';
  const rem=Math.max(0,minT-ms);
  if(rem<=0)return '<span class="arr-up">↑</span>';
  const need=dl>0?Math.ceil(rem/dl):rem;
  const p=ds/need*100;
  return p>=100?'<span class="arr-up">↑</span>':p>=70?'<span class="arr-mid">→</span>':'<span class="arr-dn">↓</span>';
}
function arrM(ms,minT,dl){
  if(!ms)return '';
  if(ms>=minT)return '<span class="arr-up">↑</span>';
  const avg=ms/daysPassed();
  return ms+avg*dl>=minT?'<span class="arr-mid">→</span>':'<span class="arr-dn">↓</span>';
}

// ── CƏDVƏL ────────────────────────────────────────────────────────────────────
function buildTable(all,tblId,ldId){
  const users=gU().filter(u=>u.type==='store');
  const targets=gT();
  const dl=dLeft();
  const periods=getPeriods();

  // Hər şöbə + hər period üçün məlumat tap
  const D={};
  users.forEach(u=>{
    D[u.name]={};
    periods.forEach(p=>{
      const found=all.find(r=>r.sobe===u.name&&r.period===p.sk);
      D[u.name][p.id]=found||null;
    });
  });

  let h='<tr class="gh">';
  periods.forEach((p,i)=>{
    h+=`<th class="lb" rowspan="2" style="vertical-align:middle">Şöbələr</th>`;
    h+=`<th colspan="3" class="${HC[i]}">${p.label}</th>`;
  });
  h+='</tr><tr class="sh">';
  periods.forEach((p,i)=>{
    h+=`<th class="${SC[i]}">Satış</th><th class="${SC[i]}">Mənfəət</th><th class="${SC[i]}">Faiz</th>`;
  });
  h+='</tr>';

  const tots=periods.map(()=>({s:0,m:0,faizler:[]}));
  const panda=users.filter(u=>u.inTotal);
  const saxa=users.filter(u=>!u.inTotal);

  panda.forEach(u=>{
    const t=targets[u.id];
    const ds=D[u.name]?.['gun']?.satis||0;
    const ms=D[u.name]?.['ay0']?.satis||0;
    h+=`<tr class="dr">`;
    periods.forEach((p,pi)=>{
      h+=`<td class="nm">${u.name}</td>`;
      const e=D[u.name]?.[p.id];
      if(e&&(e.satis>0||e.menfeet>0)){
        let arr='';
        if(p.id==='gun'&&t)arr=arrD(ds,ms,t.min,dl);
        else if(p.id==='ay0'&&t)arr=arrM(ms,t.min,dl);
        let fTd;
        if(p.id==='ay0'&&t){const pp=xPct(e.satis,t.min);fTd=`<td class="pv ${pCls(pp)}">${pStr(pp)}</td>`;}
        else{fTd=`<td class="pv">${e.faiz>0?e.faiz.toFixed(1)+'%':'—'}</td>`;}
        h+=`<td class="nv">${arr}${fmt(e.satis)}</td><td class="nv">${fmt(e.menfeet)}</td>${fTd}`;
        tots[pi].s+=e.satis;tots[pi].m+=e.menfeet;
        if(e.faiz>0)tots[pi].faizler.push(e.faiz);
      }else{h+=`<td class="dsh">—</td><td class="dsh">—</td><td class="dsh">—</td>`;}
    });
    h+='</tr>';
  });

  // Ümumi
  h+='<tr class="tr">';
  tots.forEach(t=>{
    const af=avgPct(t.faizler);
    h+=`<td class="nm">Ümumi Panda</td><td class="nv">${t.s>0?fmt(t.s):'—'}</td><td class="nv">${t.m>0?fmt(t.m):'—'}</td><td class="pv">${fmtP(af)}</td>`;
  });
  h+='</tr>';

  // Saxa
  if(saxa.length){
    h+=`<tr class="saxa-gap"><td colspan="${periods.length*4}"></td></tr>`;
    saxa.forEach(u=>{
      const t=targets[u.id];
      const ds=D[u.name]?.['gun']?.satis||0;
      const ms=D[u.name]?.['ay0']?.satis||0;
      h+=`<tr class="sr">`;
      periods.forEach((p,pi)=>{
        h+=`<td class="nm">${u.name}</td>`;
        if(pi>=2){h+=`<td class="dsh">—</td><td class="dsh">—</td><td class="dsh">—</td>`;}
        else{
          const e=D[u.name]?.[p.id];
          if(e&&(e.satis>0||e.menfeet>0)){
            let arr='';
            if(p.id==='gun'&&t)arr=arrD(ds,ms,t.min,dl);
            else if(p.id==='ay0'&&t)arr=arrM(ms,t.min,dl);
            let fTd;
            if(p.id==='ay0'&&t){const pp=xPct(e.satis,t.min);fTd=`<td class="pv ${pCls(pp)}">${pStr(pp)}</td>`;}
            else{fTd=`<td class="pv">${e.faiz>0?e.faiz.toFixed(1)+'%':'—'}</td>`;}
            h+=`<td class="nv">${arr}${fmt(e.satis)}</td><td class="nv">${fmt(e.menfeet)}</td>${fTd}`;
          }else{h+=`<td class="dsh">—</td><td class="dsh">—</td><td class="dsh">—</td>`;}
        }
      });
      h+='</tr>';
    });
  }

  const tbl=document.getElementById(tblId);
  tbl.innerHTML=h;
  document.getElementById(ldId).style.display='none';
  tbl.style.display='table';
}

function planPanelHtml(all){
  const users=gU().filter(u=>u.type==='store'&&u.showPlan);
  const targets=gT();
  const dl=dLeft();
  const periods=getPeriods();
  if(!users.length)return '<div style="color:rgba(255,255,255,.4);font-size:12px">Plan yoxdur</div>';
  let h='<div class="psg2">';
  users.forEach(u=>{
    const t=targets[u.id];if(!t)return;
    const mE=all.find(r=>r.sobe===u.name&&r.period===periods[1].sk);
    const dE=all.find(r=>r.sobe===u.name&&r.period===periods[0].sk);
    const ms=mE?.satis||0,tv=dE?.satis||0;
    let at,rm;
    if(ms<t.min){at=t.min;rm=t.min-ms;}
    else if(ms<t.mid){at=t.mid;rm=t.mid-ms;}
    else if(ms<t.max){at=t.max;rm=t.max-ms;}
    else{at=t.max;rm=0;}
    const ap=xPct(ms,at)||0;
    const dn=dl>0&&rm>0?Math.ceil(rm/dl):0;
    const bc=ms>=t.max?'#10b981':ms>=t.mid?'#3b82f6':ms>=t.min?'#f59e0b':'#ef4444';
    h+=`<div class="psi" style="${!u.inTotal?'border-left:3px solid #f59e0b':''}">
      <div class="psi-h">
        <div class="psi-n">${u.name}</div>
        <div class="psi-p" style="color:${bc}">${ap===100?'100%':ap.toFixed(1)+'%'}</div>
      </div>
      <div class="psi-bw"><div class="psi-b" style="width:${Math.min(100,ap)}%;background:${bc}"></div></div>
      <div class="psi-s">
        <div class="psi-st">Cari: <span>${fmt(ms)} ₼</span></div>
        <div class="psi-st">Hədəf: <span>${fmt(at)} ₼</span></div>
        ${rm>0?`<div class="psi-st">Gündəlik: <span>${fmt(dn)} ₼</span></div>`:'<div class="psi-st" style="color:#10b981">✅</div>'}
        <div class="psi-st">Bu gün: <span>${fmt(tv)} ₼</span></div>
      </div>
    </div>`;
  });
  return h+'</div>';
}

function changeAdminPw(){

// ── SCREENSHOT ────────────────────────────────────────────────────────────────
async function takeScr(id){
  const card=document.getElementById(id);
  const tw=card.querySelector('.rc-tw');
  const of=tw.style.overflow,ow=tw.style.width;
  tw.style.overflow='visible';tw.style.width=tw.scrollWidth+'px';
  try{
    const c=await html2canvas(card,{backgroundColor:'#ffffff',scale:3,useCORS:true,logging:false,width:card.scrollWidth,windowWidth:card.scrollWidth+40,imageTimeout:0});
    prevUrl=c.toDataURL('image/png',1.0);
    document.getElementById('prev-img').src=prevUrl;
    document.getElementById('img-ov').classList.add('show');
  }catch{alert('Şəkil alınmadı.');}
  finally{tw.style.overflow=of;tw.style.width=ow;}
}
function saveImg(){
  if(!prevUrl)return;
  const a=document.createElement('a');
  const d=getWD();
  a.download=`panda-${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}.png`;
  a.href=prevUrl;document.body.appendChild(a);a.click();document.body.removeChild(a);
}
