<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda Kids Satış Sistemi</title>

<style>
body{margin:0;font-family:Arial;background:#0a1628;color:#fff}
.screen{display:none;padding:20px}
.screen.active{display:block}
button{padding:10px;border:none;border-radius:8px;cursor:pointer}
.card{background:#1e293b;padding:12px;border-radius:10px;margin-bottom:10px}
input,select{padding:8px;border-radius:6px;border:none;margin:5px 0;width:100%}
.header{display:flex;justify-content:space-between;align-items:center}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="gate" class="screen active">
  <h2>Panda Kids</h2>
  <select id="store"></select>
  <input type="password" id="pw" placeholder="Şifrə">
  <button onclick="login()">Daxil ol</button>
  <button onclick="adminLogin()">Admin</button>
</div>

<!-- STORE -->
<div id="storePanel" class="screen">
  <div class="header">
    <h3 id="storeName"></h3>
    <button onclick="logout()">Çıx</button>
  </div>

  <div class="card">
    Günlük satış:
    <input id="daily" type="number">
    Aylıq satış:
    <input id="monthly" type="number">
  </div>

  <button onclick="save()">Yadda saxla</button>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">
  <div class="header">
    <h2>Admin Panel</h2>
    <button onclick="logout()">Çıx</button>
  </div>

  <button onclick="openAnalysis()">📊 Analiz</button>
</div>

<!-- ANALYSIS -->
<div id="analysis" class="screen">
  <div class="header">
    <h2>📊 Analiz Paneli</h2>
    <button onclick="openAdmin()">← Geri</button>
  </div>

  <div id="analysisBody"></div>
</div>

<script>

// STORES
const stores = [
  {id:"panda2",name:"Panda 2",pw:"p2-2026"},
  {id:"panda3",name:"Panda 3",pw:"p3-2026"},
  {id:"exp",name:"Panda Express",pw:"pe-2026"}
];

// TARGETS
const targets = {
  panda2:70000,
  panda3:80000,
  exp:40000
};

let currentStore=null;

// INIT SELECT
const sel=document.getElementById("store");
stores.forEach(s=>{
  let o=document.createElement("option");
  o.value=s.id;
  o.textContent=s.name;
  sel.appendChild(o);
});

// NAVIGATION
function go(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// LOGIN
function login(){
  const id=sel.value;
  const pw=document.getElementById("pw").value;
  const s=stores.find(x=>x.id===id);

  if(!s||s.pw!==pw){
    alert("Şifrə yanlışdır");
    return;
  }

  currentStore=s;
  document.getElementById("storeName").innerText=s.name;
  loadInputs();
  go("storePanel");
}

// ADMIN LOGIN
function adminLogin(){
  const p=prompt("Admin şifrə");
  if(p==="admin2026") openAdmin();
}

// STORE SAVE
function save(){
  const d=document.getElementById("daily").value;
  const m=document.getElementById("monthly").value;

  localStorage.setItem(currentStore.id+"_d",d);
  localStorage.setItem(currentStore.id+"_m",m);

  alert("Saxlanıldı");
}

// LOAD
function loadInputs(){
  document.getElementById("daily").value =
    localStorage.getItem(currentStore.id+"_d")||"";

  document.getElementById("monthly").value =
    localStorage.getItem(currentStore.id+"_m")||"";
}

// ADMIN
function openAdmin(){
  go("admin");
}

// ANALYSIS
function openAnalysis(){
  go("analysis");
  buildAnalysis();
}

function buildAnalysis(){
  let html="";
  let best=null,worst=null;

  const day=new Date().getDate();

  stores.forEach(s=>{
    const daily=Number(localStorage.getItem(s.id+"_d"))||0;
    const monthly=Number(localStorage.getItem(s.id+"_m"))||0;
    const target=targets[s.id]||0;

    const percent=target?Math.round(monthly/target*100):0;
    const forecast=monthly?Math.round(monthly/day*30):0;

    let status=
      percent>=100?"🔥 Əla":
      percent>=70?"▶ Normal":
      "❌ Zəif";

    if(percent>0){
      if(!best||percent>best.p) best={n:s.name,p:percent};
      if(!worst||percent<worst.p) worst={n:s.name,p:percent};
    }

    html+=`
      <div class="card">
        <b>${s.name}</b><br>
        📅 Bugün: ${daily} ₼<br>
        📊 Ay: ${monthly} ₼<br>
        🎯 Target: ${target} ₼<br>
        📈 Yerinə yetirmə: ${percent}%<br>
        🔮 Forecast: ${forecast} ₼<br>
        ⚡ Status: ${status}
      </div>
    `;
  });

  html=`
    <div class="card">
      <b>🏆 Ümumi</b><br>
      TOP: ${best?.n||"-"} (${best?.p||0}%)<br>
      WORST: ${worst?.n||"-"} (${worst?.p||0}%)
    </div>
  `+html;

  document.getElementById("analysisBody").innerHTML=html;
}

// LOGOUT
function logout(){
  go("gate");
}

</script>

</body>
</html>
