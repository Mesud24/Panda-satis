html,body{width:100%;overflow-x:hidden;}

.screen.active{display:flex;}
#gate{align-items:center;justify-content:center;}

.ni{width:100%;text-align:right;border:1.5px solid rgba(255,255,255,.12);border-radius:8px;padding:9px 7px;font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;color:#fff;background:rgba(255,255,255,.06);outline:none;min-width:0;}

.ni:disabled{color:rgba(255,255,255,.3);cursor:not-allowed;background:rgba(255,255,255,.03);}

.ni-f:disabled{color:rgba(255,255,255,.25);cursor:not-allowed;}

.nid{font-size:10px;color:rgba(255,255,255,.4);text-align:right;margin-top:3px;font-family:'IBM Plex Mono',monospace;font-weight:600;}
.savebtn{width:100%;padding:14px;background:linear-gradient(135deg,#c9963a,#f0c060);border:none;border-radius:12px;color:#0a1628;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;margin-top:7px;}
.savebtn:disabled{opacity:.45;cursor:not-allowed;}
.editbtn{width:100%;padding:11px;background:transparent;border:1.5px solid rgba(255,255,255,.18);border-radius:12px;color:rgba(255,255,255,.75);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;display:block;}
.okbox,.ldbox,.erbox{display:none;border-radius:12px;padding:12px 14px;font-size:13px;font-weight:600;margin-top:10px;}
.okbox{background:rgba(16,185,129,.13);border:1.5px solid rgba(16,185,129,.4);color:#6ee7b7;}
.ldbox{background:rgba(59,130,246,.13);border:1.5px solid rgba(59,130,246,.3);color:#93c5fd;}
.erbox{background:rgba(239,68,68,.13);border:1.5px solid rgba(239,68,68,.3);color:#fca5a5;}
.okbox.show,.ldbox.show,.erbox.show{display:block;}

table.rt{border-collapse:collapse;white-space:nowrap;}
table.rt th,table.rt td{border:1px solid #cdd5e0;padding:4px 10px;}
@media(min-width:768px){table.rt th,table.rt td{padding:5px 13px;}}
/* Cədvəl başlıqları — düzəldilmiş */
.rt .gh th{font-weight:800;color:#fff;vertical-align:middle;height:30px;font-size:12px;text-align:center;}
.rt .gh .lb{background:#dce6f2;color:#1e3a6e;text-align:left;border-right:2px solid #b0c4de;font-weight:800;min-width:120px;font-size:11px;}
.rt .gh .hb{background:#1d4ed8;}.rt .gh .ho{background:#c2410c;}.rt .gh .hg{background:#15803d;}.rt .gh .hp{background:#6d28d9;}

.rt .gh .period-lbl{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 8px;}
.rt .gh .period-lbl .p-day{font-size:13px;font-weight:800;letter-spacing:-.2px;}
.rt .gh .period-lbl .p-month{font-size:10px;font-weight:600;opacity:.85;}

.rt .sh .lb{background:#dce6f2;border-right:2px solid #b0c4de;text-align:left;color:#1e3a6e;font-weight:800;}
.rt .sh .sb{color:#1d4ed8;}.rt .sh .so{color:#b45309;}.rt .sh .sg{color:#15803d;}.rt .sh .sp{color:#6d28d9;}
.rt .dr td{height:26px;padding:4px 10px;vertical-align:middle;border-bottom:1px solid #edf2f7;}
.rt .dr .nm{font-weight:800;color:#0f1f3d;background:#f4f8fc;border-right:2px solid #dce4ee;white-space:nowrap;font-size:12px;text-align:left;}
.rt .dr .nv{text-align:center;color:#0f1f3d;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:12px;}
.rt .dr .pv{text-align:center;color:#374151;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;}
.rt .dr .dsh{text-align:center;color:#b0bec5;}
.rt .dr:nth-child(even) td{background:#f7fafc;}
.rt .dr:nth-child(even) .nm{background:#e8f0f8;}
.rt .sr td{height:26px;padding:4px 10px;vertical-align:middle;border-bottom:1px solid #fde68a;background:#fffcf0!important;}
.rt .sr .nm{font-weight:800;color:#7c3000;background:#fef3d0!important;border-right:2px solid #fde68a;font-style:italic;border-left:3px solid #f59e0b;white-space:nowrap;font-size:12px;text-align:left;}
.rt .sr .nv{text-align:center;color:#6b3500;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:12px;}
.rt .sr .pv{text-align:center;color:#92580a;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;}
.rt .sr .dsh{text-align:center;color:#f0b429;}
.rt .saxagap td{height:12px;background:#fff3cd!important;border-top:3px solid #f59e0b;padding:0;}
.rt .tr td{height:28px;padding:4px 10px;vertical-align:middle;background:#1e3a6e!important;border-top:2px solid #162d58;}
.rt .tr .nm{color:#bfdbfe;font-weight:800;border-right:2px solid #2d5aa0;font-size:12px;text-align:left;}
.rt .tr .nv{text-align:center;color:#fff;font-family:'IBM Plex Mono',monospace;font-weight:800;font-size:12px;}
.rt .tr .pv{text-align:center;color:#93c5fd;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:12px;}
.rt .str td{height:28px;padding:4px 10px;vertical-align:middle;background:#78350f!important;border-top:2px solid #92400e;}
.rt .str .nm{color:#fde68a;font-weight:800;border-right:2px solid #92400e;font-size:12px;text-align:left;}
.rt .str .nv{text-align:center;color:#fef3c7;font-family:'IBM Plex Mono',monospace;font-weight:800;font-size:12px;}
.rt .str .pv{text-align:center;color:#fde68a;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:12px;}

const HC=['hb','ho','hg','hp'],SC=['sb','so','sg','sp'];

const gT=()=>{try{return JSON.parse(localStorage.getItem('pk_tgts')||'null')||DEF_TGTS;}catch{return DEF_TGTS;}};

// ── TARİX ─────────────────────────────────────────────────────────────────────
// DÜZƏLTMƏ: Hər iki funksiya gecə 12-dən yenilənir
// Fərq: form cədvəli saat 17-dən, plan kartı isə gecə 12-dən
function getRealDay(){
  // Həmişə real günü qaytarır (gecə 12-dən sonra yeni gün)
  return new Date();
}
function getFormDay(){
  // Satış formu: saat 17-dən sonra yeni gün (biznes günü)
  const n=new Date(),d=new Date(n);
  if(n.getHours()<17)d.setDate(d.getDate()-1);
  return d;
}

// Qalan gün: gecə 12-dən sonra yenilənir (real günə görə)
function dLeft(){
  const d=getRealDay();
  return Math.max(0,new Date(d.getFullYear(),d.getMonth()+1,0).getDate()-d.getDate());
}
function daysPassed(){return Math.max(1,getRealDay().getDate());}

function getPeriods(){
  // Cədvəl tarixi: saat 17 məntiqi
  const d=getFormDay();
  const yr=d.getFullYear(),mo=d.getMonth(),day=d.getDate();
  const moPad=String(mo+1).padStart(2,'0');
  return [
    {id:'gun', label:`${day} ${AY[mo]} ${yr}`,
     sk:`G_${yr}_${moPad}_${String(day).padStart(2,'0')}`,
     ck:`G_${yr}_${moPad}_${String(day).padStart(2,'0')}`},
    {id:'ay0', label:`1-${day} ${AY[mo]} ${yr}`,
     sk:`A_${yr}_${moPad}`, ck:`A_${yr}_${moPad}`},
    {id:'ay1', label:`1-${day} ${AY[mo]} ${yr-1}`,
     sk:`A_${yr-1}_${moPad}`, ck:`A_${yr-1}_${moPad}`},
    {id:'ay2', label:`1-${day} ${AY[mo]} ${yr-2}`,
     sk:`A_${yr-2}_${moPad}`, ck:`A_${yr-2}_${moPad}`}
  ];
}

function fmtDate(){
  // Başlıq tarixi: real gün (gecə 12)
  const d=getRealDay();
  return `${GUNS[d.getDay()]}, ${d.getDate()} ${AY[d.getMonth()]} ${d.getFullYear()}`;
}
function fmtFDate(){
  const d=getFormDay();
  return `${GUNS[d.getDay()]}, ${d.getDate()} ${AY[d.getMonth()]} ${d.getFullYear()}`;
}

function fmt(n){if(!n||n==0)return '—';return Number(n).toLocaleString('az-AZ',{minimumFractionDigits:0,maximumFractionDigits:0}).replace(/\./g,',');}
function xPct(v,t){if(!v||!t)return null;const r=v/t*100;return r>=100?100:Math.floor(r*10)/10;}
function pStr(p){if(p===null)return '—';return p===100?'100%':p.toFixed(1)+'%';}
function pCls(p){if(p===null)return '';if(p>=100)return 'pct-done';if(p>=70)return 'pct-mid';return 'pct-low';}
function avgF(arr){const v=arr.filter(x=>x>0);return v.length?v.reduce((a,b)=>a+b)/v.length:null;}
function fP(p){return p===null?'—':p.toFixed(1)+'%';}

function lcGet(k){try{return JSON.parse(localStorage.getItem(k)||'null');}catch{return null;}}
function lcSet(k,v){localStorage.setItem(k,JSON.stringify(v));}

// ── GİRİŞ JURNALI ─────────────────────────────────────────────────────────────
function logLogin(name){
  const logs=lcGet('pk_jurnal')||[];
  const now=new Date();
  const timeStr=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const dateStr=`${now.getDate()} ${AY[now.getMonth()]}`;
  logs.unshift({name,time:timeStr,date:dateStr,ts:now.getTime()});
  // Son 50 girişi saxla
  if(logs.length>50)logs.length=50;
  lcSet('pk_jurnal',logs);
}
function renderJurnal(){
  const logs=lcGet('pk_jurnal')||[];
  if(!logs.length)return '<div class="jurnal-empty">Hələ giriş yoxdur</div>';
  return logs.slice(0,20).map(l=>`
    <div class="jurnal-item">
      <div class="jurnal-name">${l.name}</div>
      <div class="jurnal-time">${l.date} — ${l.time}</div>
    </div>`).join('');
}

function goTo(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ── PLAN KARTI ────────────────────────────────────────────────────────────────
function planCard(sid,curMs){
  const t=gT()[sid];if(!t)return '';
  const dl=dLeft(); // gecə 12-dən yenilənir
  const periods=getPeriods();
  const tv=lcGet(periods[0].ck+'_'+sid)?.satis||0;
  const pm=xPct(curMs,t.min),pd=curMs>=t.min?xPct(curMs,t.mid):null,px=curMs>=t.mid?xPct(curMs,t.max):null;
  let at,rm;
  if(curMs<t.min){at=t.min;rm=t.min-curMs;}
  else if(curMs<t.mid){at=t.mid;rm=t.mid-curMs;}
  else if(curMs<t.max){at=t.max;rm=t.max-curMs;}
  else{at=t.max;rm=0;}
  const ap=xPct(curMs,at)||0,dn=dl>0&&rm>0?Math.ceil(rm/dl):0;
  const bc=curMs>=t.max?'#10b981':curMs>=t.mid?'#3b82f6':curMs>=t.min?'#f59e0b':'#ef4444';
  return `<div class="plancard" id="pc-${sid}">
    <div class="plantitle">📊 Bu Ay Hədəflər</div>
    <div class="plangrid">
      <div class="planitem ${pm!==null&&pm>=100?'done':'active'}">
        <div class="pil">🥉 Min</div><div class="piv">${fmt(t.min)}</div>
        <div class="pip ${pm!==null&&pm>=100?'done':'cur'}">${pStr(pm)}</div>
      </div>
      <div class="planitem ${pd!==null&&pd>=100?'done':pm!==null&&pm>=100?'active':''}">
        <div class="pil">🥈 Orta</div><div class="piv">${fmt(t.mid)}</div>
        <div class="pip ${pd!==null&&pd>=100?'done':'cur'}">${pd!==null?pStr(pd):'—'}</div>
      </div>
      <div class="planitem ${px!==null&&px>=100?'done':pd!==null&&pd>=100?'active':''}">
        <div class="pil">🥇 Maks</div><div class="piv">${fmt(t.max)}</div>
        <div class="pip ${px!==null&&px>=100?'done':'cur'}">${px!==null?pStr(px):'—'}</div>
      </div>
    </div>
    <div class="ppl"><span>Cari: ${fmt(curMs)} ₼</span><strong>${fmt(at)} — ${ap===100?'100':ap.toFixed(1)}%</strong></div>
    <div class="pbw"><div class="pb" style="width:${Math.min(100,ap)}%;background:${bc}"></div></div>
    <div class="psg">
      <div class="ps"><div class="psl">📅 Qalan gün</div><div class="psv">${dl}</div></div>
      <div class="ps"><div class="psl">💰 Gündəlik lazım</div><div class="psv">${rm>0?fmt(dn)+' ₼':'✅'}</div></div>
      <div class="ps"><div class="psl">📈 Bu gün</div><div class="psv">${fmt(tv)} ₼</div></div>
      <div class="ps"><div class="psl">⬆️ Növbəti hədəfə</div><div class="psv">${rm>0?fmt(rm)+' ₼':'🏆'}</div></div>
    </div>
  </div>`;
}

function sF(id){
  const inp=document.getElementById(id);if(!inp)return;
  const v=parseFloat(inp.value)||0;
  let d=document.getElementById('d_'+id);
  if(!d){d=document.createElement('div');d.id='d_'+id;d.className='nid';inp.parentNode.appendChild(d);}
  d.textContent=v>0?fmt(v):'';
}

function renderForm(sid){
  const u=gU().find(u=>u.id===sid);
  const isSaxa=!u.inTotal;
  const periods=getPeriods();
  const activePeriods=isSaxa?periods.slice(0,2):periods;
  document.getElementById('sftitle').textContent=u.name;
  document.getElementById('sfdate').textContent=fmtDate();
  const body=document.getElementById('sfbody');
  const allSaved=!editMode&&activePeriods.every(p=>lcGet(p.ck+'_'+sid)!==null);
  const ms=lcGet(periods[1].ck+'_'+sid)?.satis||0;
  const t_=gT()[sid];
  const PCOL=['#2E75B6','#C55A11','#375623','#7030A0'];
  let h=t_?planCard(sid,ms):'';
  activePeriods.forEach((period,pi)=>{
    const saved=editMode?null:lcGet(period.ck+'_'+sid);
    const cv=lcGet(period.ck+'_'+sid);
    const dis=(!editMode&&saved)?'disabled':'';
    const sv=editMode&&cv?cv.satis:(saved?.satis??'');
    const mv=editMode&&cv?cv.menfeet:(saved?.menfeet??'');
    const fv=editMode&&cv?cv.faiz:(saved?.faiz??'');
    const isAy=period.id==='ay0',isGun=period.id==='gun';
    const lu=isAy?`oninput="upPlan(this.value);sF('s-ay0')"`
      :isGun?`oninput="upToday();sF('s-gun')"`:`oninput="sF('s-${period.id}')"`;
    h+=`<div class="perblock">
      <div class="perhdr" style="background:${PCOL[pi]}">${period.label}</div>
      <table class="pt"><thead><tr>
        <th style="text-align:left">Göstərici</th><th>Satış (₼)</th><th>Mənfəət (₼)</th><th>Faiz (%)</th>
      </tr></thead><tbody><tr>
        <td class="pn">Ümumi satış</td>
        <td><input class="ni" type="number" min="0" id="s-${period.id}" value="${sv}" placeholder="0" ${dis} ${lu}>${sv?`<div class="nid">${fmt(sv)}</div>`:''}</td>
        <td><input class="ni" type="number" min="0" id="m-${period.id}" value="${mv}" placeholder="0" ${dis} oninput="sF('m-${period.id}')">${mv?`<div class="nid">${fmt(mv)}</div>`:''}</td>
        <td><input class="ni-f" type="number" min="0" step="0.1" id="f-${period.id}" value="${fv}" placeholder="0" ${dis}></td>
      </tr></tbody></table>
    </div>`;
  });
  if(allSaved){
    h+=`<button class="savebtn" disabled>✓ Saxlanıldı</button>
    <button class="editbtn" id="ebt" onclick="enableEdit()">✏️ Düzəliş et</button>
    <div class="okbox show">✅ Bu günün məlumatları saxlanıldı.</div>`;
  }else{
    h+=`<button class="savebtn" id="sbt" onclick="doSave()">✓ Yadda Saxla</button>
    <div class="ldbox" id="ldb">⏳ Göndərilir...</div>
    <div class="okbox" id="okb">✅ Uğurla saxlandı!</div>
    <div class="erbox" id="erb">❌ Xəta baş verdi.</div>`;
  }
  body.innerHTML=h;goTo('store-form');
}

function upPlan(v){
  const h=planCard(curSid,parseFloat(v)||0);
  const el=document.getElementById(`pc-${curSid}`);
  if(el){const t=document.createElement('div');t.innerHTML=h;el.replaceWith(t.firstElementChild);}
}
function upToday(){
  const periods=getPeriods();
  const ms=parseFloat(document.getElementById('s-ay0')?.value)||lcGet(periods[1].ck+'_'+curSid)?.satis||0;
  upPlan(ms);
}
function enableEdit(){
  editMode=true;renderForm(curSid);
  setTimeout(()=>{
    document.querySelectorAll('.ni,.ni-f').forEach(i=>i.disabled=false);
    const sb=document.getElementById('sbt');if(sb){sb.disabled=false;sb.textContent='✓ Yadda Saxla';}
    const eb=document.getElementById('ebt');if(eb)eb.style.display='none';
    document.querySelectorAll('.okbox').forEach(b=>b.classList.remove('show'));
  },50);

function arrD(ds,ms,minT,dl){
  if(!ds)return '';
  const rem=Math.max(0,minT-ms);if(rem<=0)return '<span class="arr-up">↑</span>';
  const need=dl>0?Math.ceil(rem/dl):rem,p=ds/need*100;
  return p>=100?'<span class="arr-up">↑</span>':p>=70?'<span class="arr-mid">→</span>':'<span class="arr-dn">↓</span>';
}
function arrM(ms,minT,dl){
  if(!ms)return '';if(ms>=minT)return '<span class="arr-up">↑</span>';
  const avg=ms/daysPassed();return ms+avg*dl>=minT?'<span class="arr-mid">→</span>':'<span class="arr-dn">↓</span>';
}

// Period label-i 2 hissəyə böl: gün + ay-il
function splitPeriodLabel(label){
  // "4 aprel 2026" → day="4", rest="aprel 2026"
  // "1-4 aprel 2026" → day="1-4", rest="aprel 2026"
  const parts=label.split(' ');
  return {day:parts[0],rest:parts.slice(1).join(' ')};
}

function buildTable(all,tblId,ldId){
  const users=gU().filter(u=>u.type==='store');
  const targets=gT(),dl=dLeft();
  const periods=getPeriods();
  const D={};
  users.forEach(u=>{
    D[u.name]={};
    periods.forEach(p=>{
      const cached=lcGet(p.ck+'_'+u.id);
      const binEntry=all.find(r=>r.sobe===u.name&&r.period===p.sk);
      const e=cached||binEntry||null;
      D[u.name][p.id]=e?{satis:e.satis||0,menfeet:e.menfeet||0,faiz:e.faiz||0}:{satis:0,menfeet:0,faiz:0};
    });
  });

  let h='<tr class="gh">';
  periods.forEach((p,i)=>{
    const lbl=splitPeriodLabel(p.label);
    h+=`<th class="lb" rowspan="2" style="vertical-align:middle">Şöbələr</th>`;
    h+=`<th colspan="3" class="${HC[i]}"><div class="period-lbl"><span class="p-day">${lbl.day}</span><span class="p-month">${lbl.rest}</span></div></th>`;
  });
  h+='</tr><tr class="sh">';
  periods.forEach((p,i)=>{
    h+=`<th class="${SC[i]}">Satış</th><th class="${SC[i]}">Mənfəət</th><th class="${SC[i]}">Faiz</th>`;
  });
  h+='</tr>';

  const pTots=periods.map(()=>({s:0,m:0,fl:[]}));
  const sTots=periods.map(()=>({s:0,m:0,fl:[]}));
  const panda=users.filter(u=>u.inTotal),saxa=users.filter(u=>!u.inTotal);

  panda.forEach(u=>{
    const t=targets[u.id];
    h+=`<tr class="dr">`;
    periods.forEach((p,pi)=>{
      const e=D[u.name][p.id];
      h+=`<td class="nm">${u.name}</td>`;
      if(e&&(e.satis>0||e.menfeet>0)){
        let arr='';
        if(p.id==='gun'&&t)arr=arrD(e.satis,D[u.name]['ay0'].satis,t.min,dl);
        else if(p.id==='ay0'&&t)arr=arrM(e.satis,t.min,dl);
        let fTd;
        if(p.id==='ay0'&&t){const pp=xPct(e.satis,t.min);fTd=`<td class="pv ${pCls(pp)}">${pStr(pp)}</td>`;}
        else{fTd=`<td class="pv">${e.faiz>0?e.faiz.toFixed(1)+'%':'—'}</td>`;}
        h+=`<td class="nv">${arr}${fmt(e.satis)}</td><td class="nv">${fmt(e.menfeet)}</td>${fTd}`;
        pTots[pi].s+=e.satis;pTots[pi].m+=e.menfeet;if(e.faiz>0)pTots[pi].fl.push(e.faiz);
      }else{h+=`<td class="dsh">—</td><td class="dsh">—</td><td class="dsh">—</td>`;}
    });
    h+='</tr>';
  });
  h+='<tr class="tr">';
  pTots.forEach(t=>{const af=avgF(t.fl);h+=`<td class="nm">Ümumi Panda</td><td class="nv">${t.s>0?fmt(t.s):'—'}</td><td class="nv">${t.m>0?fmt(t.m):'—'}</td><td class="pv">${fP(af)}</td>`;});
  h+='</tr>';

  if(saxa.length){
    h+=`<tr class="saxagap"><td colspan="${periods.length*4}"></td></tr>`;
    saxa.forEach(u=>{
      const t=targets[u.id];
      h+=`<tr class="sr">`;
      periods.forEach((p,pi)=>{
        h+=`<td class="nm">${u.name}</td>`;
        if(pi>=2){h+=`<td class="dsh">—</td><td class="dsh">—</td><td class="dsh">—</td>`;return;}
        const e=D[u.name][p.id];
        if(e&&(e.satis>0||e.menfeet>0)){
          let arr='';
          if(p.id==='gun'&&t)arr=arrD(e.satis,D[u.name]['ay0'].satis,t.min,dl);
          else if(p.id==='ay0'&&t)arr=arrM(e.satis,t.min,dl);
          let fTd;
          if(p.id==='ay0'&&t){const pp=xPct(e.satis,t.min);fTd=`<td class="pv ${pCls(pp)}">${pStr(pp)}</td>`;}
          else{fTd=`<td class="pv">${e.faiz>0?e.faiz.toFixed(1)+'%':'—'}</td>`;}
          h+=`<td class="nv">${arr}${fmt(e.satis)}</td><td class="nv">${fmt(e.menfeet)}</td>${fTd}`;
          sTots[pi].s+=e.satis;sTots[pi].m+=e.menfeet;if(e.faiz>0)sTots[pi].fl.push(e.faiz);
        }else{h+=`<td class="dsh">—</td><td class="dsh">—</td><td class="dsh">—</td>`;}
      });
      h+='</tr>';
    });
    h+='<tr class="str">';
    sTots.forEach((t,pi)=>{
      const af=avgF(t.fl);
      if(pi>=2){h+=`<td class="nm">Yekun Saxa</td><td class="dsh">—</td><td class="dsh">—</td><td class="dsh">—</td>`;return;}
      h+=`<td class="nm">Yekun Saxa</td><td class="nv">${t.s>0?fmt(t.s):'—'}</td><td class="nv">${t.m>0?fmt(t.m):'—'}</td><td class="pv">${fP(af)}</td>`;
    });
    h+='</tr>';
  }

  const tbl=document.getElementById(tblId);
  tbl.innerHTML=h;document.getElementById(ldId).style.display='none';tbl.style.display='table';
}

function planPanelHtml(forSaxa){
  const users=gU().filter(u=>u.type==='store'&&u.showPlan&&(forSaxa?!u.inTotal:u.inTotal));
  const targets=gT(),dl=dLeft();
  const periods=getPeriods();
  if(!users.length)return '<div style="color:rgba(255,255,255,.4);font-size:12px;padding:8px">Plan yoxdur</div>';
  let h='<div class="ppgrid">';
  users.forEach(u=>{
    const t=targets[u.id];if(!t)return;
    const ms=lcGet(periods[1].ck+'_'+u.id)?.satis||0;
    const tv=lcGet(periods[0].ck+'_'+u.id)?.satis||0;
    let at,rm;
    if(ms<t.min){at=t.min;rm=t.min-ms;}
    else if(ms<t.mid){at=t.mid;rm=t.mid-ms;}
    else if(ms<t.max){at=t.max;rm=t.max-ms;}
    else{at=t.max;rm=0;}
    const ap=xPct(ms,at)||0,dn=dl>0&&rm>0?Math.ceil(rm/dl):0;
    const bc=ms>=t.max?'#10b981':ms>=t.mid?'#3b82f6':ms>=t.min?'#f59e0b':'#ef4444';
    const pmn=xPct(ms,t.min)||0,pmd=ms>=t.min?xPct(ms,t.mid)||0:0,pmx=ms>=t.mid?xPct(ms,t.max)||0:0;
    h+=`<div class="ppi">
      <div class="ppih"><div class="ppin">${u.name}</div><div class="ppip" style="color:${bc}">${ap===100?'100%':ap.toFixed(1)+'%'}</div></div>
      <div class="ppibw"><div class="ppib" style="width:${Math.min(100,ap)}%;background:${bc}"></div></div>
      <div class="ppilevels">
        <div class="ppilvl ${pmn>=100?'reached':ms<t.min?'current':'reached'}">🥉 ${pmn>=100?'✓':pStr(xPct(ms,t.min))}</div>
        <div class="ppilvl ${pmd>=100?'reached':ms>=t.min&&ms<t.mid?'current':'pending'}">🥈 ${pmd>0?pStr(xPct(ms,t.mid)):'—'}</div>
        <div class="ppilvl ${pmx>=100?'reached':ms>=t.mid&&ms<t.max?'current':'pending'}">🥇 ${pmx>0?pStr(xPct(ms,t.max)):'—'}</div>
      </div>
      <div class="ppis">
        <div class="ppist">Cari: <span>${fmt(ms)} ₼</span></div>
        <div class="ppist">Hədəf: <span>${fmt(at)} ₼</span></div>
        ${rm>0?`<div class="ppist">Gündəlik: <span>${fmt(dn)} ₼</span></div>`:'<div class="ppist" style="color:#10b981">✅</div>'}
        <div class="ppist">Bu gün: <span>${fmt(tv)} ₼</span></div>
      </div>
    </div>`;
  });
  return h+'</div>';
}
