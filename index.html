// ── TARİX — AVTOMATIK AY ──────────────────────────────────────────────────────
function getWorkDay(){
  const now=new Date(),d=new Date(now);
  if(now.getHours()<17)d.setDate(d.getDate()-1);
  return d;
}
function tKey(){
  const d=getWorkDay();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dLeft(){
  const d=getWorkDay();
  return Math.max(0,new Date(d.getFullYear(),d.getMonth()+1,0).getDate()-d.getDate());
}
function daysPassed(){return Math.max(1,getWorkDay().getDate());}

// Ay adları Azərbaycan dilində
const AY_ADLARI=["yanvar","fevral","mart","aprel","may","iyun","iyul","avqust","sentyabr","oktyabr","noyabr","dekabr"];

function getPeriodLabel(p){
  const d=getWorkDay();
  const day=d.getDate(),yr=d.getFullYear();
  const mon=d.getMonth(); // 0-11
  if(p==="gunluk") return `${day} ${AY_ADLARI[mon]} ${yr}`;
  if(p==="cari_ay") return `1-${day} ${AY_ADLARI[mon]} ${yr}`;
  if(p==="kecen_ay1"){
    const prev=new Date(d.getFullYear(),d.getMonth()-1,1);
    return `1-${day} ${AY_ADLARI[prev.getMonth()]} ${prev.getFullYear()}`;
  }
  if(p==="kecen_ay2"){
    const prev=new Date(d.getFullYear(),d.getMonth()-2,1);
    return `1-${day} ${AY_ADLARI[prev.getMonth()]} ${prev.getFullYear()}`;
  }
  return p;
}

// Cari ay periodu üçün cache açarı (ay əsaslı)
function getPeriodCacheKey(p){
  const d=getWorkDay();
  const yr=d.getFullYear(),mon=String(d.getMonth()+1).padStart(2,'0');
  if(p==="gunluk") return `${yr}${mon}${String(d.getDate()).padStart(2,'0')}`;
  if(p==="cari_ay") return `${yr}${mon}`;
  if(p==="kecen_ay1"){const prev=new Date(d.getFullYear(),d.getMonth()-1,1);return `${prev.getFullYear()}${String(prev.getMonth()+1).padStart(2,'0')}`;}
  if(p==="kecen_ay2"){const prev=new Date(d.getFullYear(),d.getMonth()-2,1);return `${prev.getFullYear()}${String(prev.getMonth()+1).padStart(2,'0')}`;}
  return p;
}

// JSONBin-dəki period adı (saxlama üçün)
function getPeriodStoreKey(p){
  const d=getWorkDay();
  const yr=d.getFullYear(),mon=String(d.getMonth()+1).padStart(2,'0');
  if(p==="gunluk") return `gunluk_${tKey()}`;
  if(p==="cari_ay") return `ay_${yr}${mon}`;
  if(p==="kecen_ay1"){const prev=new Date(d.getFullYear(),d.getMonth()-1,1);return `ay_${prev.getFullYear()}${String(prev.getMonth()+1).padStart(2,'0')}`;}
  if(p==="kecen_ay2"){const prev=new Date(d.getFullYear(),d.getMonth()-2,1);return `ay_${prev.getFullYear()}${String(prev.getMonth()+1).padStart(2,'0')}`;}
  return p;
}

// Mağazanın daxil etdiyi period açarları (form üçün)
function getStorePeriods(store){
  const isSaxa=!store.inTotal&&store.type==="store";
  return isSaxa?["gunluk","cari_ay"]:PERIODS;
}

function fmt(n){
  if(n===null||n===undefined||n===''||n==0)return '—';
  return Number(n).toLocaleString('az-AZ',{minimumFractionDigits:0,maximumFractionDigits:0}).replace(/\./g,',');
}
function fmtDate(){
  const d=getWorkDay();
  return d.toLocaleDateString('az-AZ',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function exactPct(val,target){
  if(!val||!target||target===0)return null;
  const raw=(val/target)*100;
  return raw>=100?100.0:Math.floor(raw*10)/10;
}
function pctStr(p){
  if(p===null||p===undefined)return '—';
  return p===100?'100%':p.toFixed(1)+'%';
}
function pctCls(p){
  if(p===null)return '';
  if(p>=100)return 'pct-done';
  if(p>=70)return 'pct-mid';
  return 'pct-low';
}
// Sadə ortalama faiz: (f1+f2+f3)/n
function simplAvgPct(faizler){
  const valid=faizler.filter(f=>f>0);
  if(!valid.length)return null;
  return valid.reduce((a,b)=>a+b,0)/valid.length;
}
function fmtPct(p){return p===null?'—':p.toFixed(1)+'%';}

function ck(sid,p){return `pk16_${sid}_${getPeriodCacheKey(p)}`;}
function gc(sid,p){try{return JSON.parse(localStorage.getItem(ck(sid,p))||'null');}catch{return null;}}
function sc(sid,p,d){localStorage.setItem(ck(sid,p),JSON.stringify(d));}
function goTo(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function logout(){curStore=null;editMode=false;isViewer=false;document.getElementById('gate-pw').value='';document.getElementById('gate-err').classList.remove('show');document.getElementById('gate-store').value='';goTo('gate');}

function buildSel(){
  const sel=document.getElementById('gate-store');
  sel.innerHTML='<option value="">— Seçin —</option>';
  gS().filter(s=>s.type!=='viewer').forEach(s=>{
    const o=document.createElement('option');o.value=s.id;o.textContent=s.name;sel.appendChild(o);
  });
  // Baxış istifadəçiləri
  const viewers=gS().filter(s=>s.type==='viewer');

function doLogin(){

// ── PLAN HTML ─────────────────────────────────────────────────────────────────
function planHtml(sid,cur){
  const t=gT()[sid];if(!t)return '';
  const dl=dLeft();
  const tv=gc(sid,'gunluk')?.satis||0;
  const pm=exactPct(cur,t.min);
  const pd=cur>=t.min?exactPct(cur,t.mid):null;
  const px=cur>=t.mid?exactPct(cur,t.max):null;
  let at,rm;
  if(cur<t.min){at=t.min;rm=t.min-cur;}
  else if(cur<t.mid){at=t.mid;rm=t.mid-cur;}
  else if(cur<t.max){at=t.max;rm=t.max-cur;}
  else{at=t.max;rm=0;}
  const ap=exactPct(cur,at)||0;
  const dn=dl>0&&rm>0?Math.ceil(rm/dl):0;
  const bc=cur>=t.max?'#10b981':cur>=t.mid?'#3b82f6':cur>=t.min?'#f59e0b':'#ef4444';
  const apStr=ap===100?'100':ap.toFixed(1);
  return `<div class="plan-card" id="pc-${sid}">
    <div class="plan-title">📊 Bu Ay Hədəflər</div>
    <div class="plan-grid">
      <div class="plan-item ${pm!==null&&pm>=100?'done':'current'}">
        <div class="plan-item-label">🥉 Min</div>
        <div class="plan-item-val">${fmt(t.min)}</div>
        <div class="plan-item-pct ${pm!==null&&pm>=100?'done':'cur'}">${pctStr(pm)}</div>
      </div>
      <div class="plan-item ${pd!==null&&pd>=100?'done':pm!==null&&pm>=100?'current':''}">
        <div class="plan-item-label">🥈 Orta</div>
        <div class="plan-item-val">${fmt(t.mid)}</div>
        <div class="plan-item-pct ${pd!==null&&pd>=100?'done':'cur'}">${pd!==null?pctStr(pd):'—'}</div>
      </div>
      <div class="plan-item ${px!==null&&px>=100?'done':pd!==null&&pd>=100?'current':''}">
        <div class="plan-item-label">🥇 Maks</div>
        <div class="plan-item-val">${fmt(t.max)}</div>
        <div class="plan-item-pct ${px!==null&&px>=100?'done':'cur'}">${px!==null?pctStr(px):'—'}</div>
      </div>
    </div>
    <div class="plan-prog-lbl"><span>Cari: ${fmt(cur)} ₼</span><strong>${fmt(at)} — ${apStr}%</strong></div>
    <div class="plan-bar-wrap"><div class="plan-bar" style="width:${Math.min(100,ap)}%;background:${bc}"></div></div>
    <div class="plan-stats">
      <div class="plan-stat"><div class="plan-stat-lbl">📅 Qalan gün</div><div class="plan-stat-val">${dl}</div></div>
      <div class="plan-stat"><div class="plan-stat-lbl">💰 Gündəlik lazım</div><div class="plan-stat-val">${rm>0?fmt(dn)+' ₼':'✅'}</div></div>
      <div class="plan-stat"><div class="plan-stat-lbl">📈 Bu gün</div><div class="plan-stat-val">${fmt(tv)} ₼</div></div>
      <div class="plan-stat"><div class="plan-stat-lbl">⬆️ Növbəti hədəfə</div><div class="plan-stat-val">${rm>0?fmt(rm)+' ₼':'🏆'}</div></div>
    </div>
  </div>`;
}

function showFmt(id){
  const inp=document.getElementById(id);if(!inp)return;
  const v=parseFloat(inp.value)||0;
  let d=document.getElementById('d-'+id);
  if(!d){d=document.createElement('div');d.id='d-'+id;d.className='ni-display';inp.parentNode.appendChild(d);}
  d.textContent=v>0?fmt(v):'';
}

function renderForm(sid){
  const store=gS().find(s=>s.id===sid);
  const periods=getStorePeriods(store);
  document.getElementById('sf-title').textContent=store.name;
  document.getElementById('sf-date').textContent=fmtDate();
  const body=document.getElementById('sf-body');
  const allSaved=!editMode&&periods.every(p=>gc(sid,p)!==null);
  const ms=gc(sid,'cari_ay')?.satis||0;
  const t=gT()[sid];
  let h=t?planHtml(sid,ms):'';
  periods.forEach(period=>{
    const saved=editMode?null:gc(sid,period);
    const cv=gc(sid,period);
    const dis=(!editMode&&saved)?'disabled':'';
    const sv=editMode&&cv?cv.satis:(saved?.satis??'');
    const mv=editMode&&cv?cv.menfeet:(saved?.menfeet??'');
    const fv=editMode&&cv?cv.faiz:(saved?.faiz??'');
    const PC={"gunluk":"#2E75B6","cari_ay":"#C55A11","kecen_ay1":"#375623","kecen_ay2":"#7030A0"};
    const luS=period==='cari_ay'?`oninput="upPlan(this.value);showFmt('s-${period}')"`
      :period==='gunluk'?`oninput="upToday();showFmt('s-${period}')"`
      :`oninput="showFmt('s-${period}')"`;
    h+=`<div class="period-block">
      <div class="period-header" style="background:${PC[period]}">${getPeriodLabel(period)}</div>
      <table class="pt"><thead><tr>
        <th style="text-align:left">Göstərici</th><th>Satış (₼)</th><th>Mənfəət (₼)</th><th>Faiz (%)</th>
      </tr></thead><tbody><tr>
        <td class="pn">Ümumi satış</td>
        <td><input class="ni" type="number" min="0" step="0.01" id="s-${period}" value="${sv}" placeholder="0" ${dis} ${luS}>${sv?`<div class="ni-display">${fmt(sv)}</div>`:''}</td>
        <td><input class="ni" type="number" min="0" step="0.01" id="m-${period}" value="${mv}" placeholder="0" ${dis} oninput="showFmt('m-${period}')">${mv?`<div class="ni-display">${fmt(mv)}</div>`:''}</td>
        <td><input class="ni-faiz" type="number" min="0" step="0.1" id="f-${period}" value="${fv}" placeholder="0" ${dis}></td>
      </tr></tbody></table>
    </div>`;
  });
  if(allSaved){
    h+=`<button class="save-btn" disabled>✓ Saxlanıldı</button>
    <button class="edit-btn" id="edit-btn" onclick="enableEdit()">✏️ Düzəliş et</button>
    <div class="ok-box show">✅ Bu günün məlumatları saxlanıldı.</div>`;
  }else{
    h+=`<button class="save-btn" id="sbtn" onclick="doSave()">✓ Yadda Saxla</button>
    <div class="ld-box" id="ldb">⏳ Göndərilir...</div>
    <div class="ok-box" id="okb">✅ Uğurla saxlandı!</div>
    <div class="er-box" id="erb">❌ Xəta baş verdi.</div>`;
  }
  body.innerHTML=h;goTo('store-form');
}

function upPlan(v){
  const h=planHtml(curStore,parseFloat(v)||0);
  const el=document.getElementById(`pc-${curStore}`);
  if(el){const t=document.createElement('div');t.innerHTML=h;el.replaceWith(t.firstElementChild);}
}
function upToday(){
  const ms=parseFloat(document.getElementById('s-cari_ay')?.value)||gc(curStore,'cari_ay')?.satis||0;
  upPlan(ms);
}
function enableEdit(){
  editMode=true;renderForm(curStore);
  setTimeout(()=>{
    document.querySelectorAll('.ni,.ni-faiz').forEach(i=>i.disabled=false);
    const sb=document.getElementById('sbtn');if(sb){sb.disabled=false;sb.textContent='✓ Yadda Saxla';}
    const eb=document.getElementById('edit-btn');if(eb)eb.style.display='none';
    const okb=document.getElementById('okb');if(okb)okb.classList.remove('show');
  },50);
}

async function rBin(){
  try{const r=await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY,'X-Bin-Meta':'false'}});if(!r.ok)return[];const j=await r.json();return j.data||[];}catch{return[];}
}
async function wBin(data){
  try{await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY,'X-Bin-Meta':'false'},body:JSON.stringify({data})});}catch(e){console.error(e);}
}

async function doSave(){
  const sid=curStore;
  const store=gS().find(s=>s.id===sid);
  const periods=getStorePeriods(store);
  const res={};let any=false;
  for(const p of periods){
    const s=parseFloat(document.getElementById(`s-${p}`)?.value)||0;
    const m=parseFloat(document.getElementById(`m-${p}`)?.value)||0;
    const f=parseFloat(document.getElementById(`f-${p}`)?.value)||0;
    if(s>0||m>0||f>0)any=true;
    res[p]={satis:s,menfeet:m,faiz:f};
  }
  if(!any){alert('Ən azı bir rəqəm daxil edin.');return;}
  document.getElementById('sbtn').disabled=true;
  document.getElementById('ldb').classList.add('show');
  document.getElementById('erb').classList.remove('show');
  try{
    const all=await rBin();
    for(const p of periods){
      const d=res[p];
      const psk=getPeriodStoreKey(p);
      const idx=all.findIndex(r=>r.sobe===store.name&&r.period===psk);
      const e={sobe:store.name,period:psk,satis:d.satis,menfeet:d.menfeet,faiz:d.faiz};
      if(idx>=0){all[idx]=e;}else{all.push(e);}
      sc(sid,p,d);
    }
    await wBin(all);
    editMode=false;
    document.getElementById('ldb').classList.remove('show');
    document.getElementById('okb').classList.add('show');
    document.getElementById('sbtn').textContent='✓ Saxlanıldı';
    document.querySelectorAll('.ni,.ni-faiz').forEach(i=>i.disabled=true);
    const sb=document.getElementById('sbtn');
    if(sb){const eb=document.createElement('button');eb.className='edit-btn';eb.id='edit-btn';eb.textContent='✏️ Düzəliş et';eb.onclick=enableEdit;sb.parentNode.insertBefore(eb,sb.nextSibling);}
    upPlan(res['cari_ay']?.satis||0);
  }catch{
    document.getElementById('ldb').classList.remove('show');
    document.getElementById('erb').classList.add('show');
    document.getElementById('sbtn').disabled=false;
  }
}

// ── OX ────────────────────────────────────────────────────────────────────────
function arrowDaily(ds,ms,minT,dl){
  if(!ds)return '';
  const rem=Math.max(0,minT-ms);
  if(rem<=0)return '<span class="arr-up">↑</span>';
  const need=dl>0?Math.ceil(rem/dl):rem;
  const p=ds/need*100;
  if(p>=100)return '<span class="arr-up">↑</span>';
  if(p>=70)return '<span class="arr-mid">→</span>';
  return '<span class="arr-dn">↓</span>';
}
function arrowMonthly(ms,minT,dl){
  if(!ms)return '';
  if(ms>=minT)return '<span class="arr-up">↑</span>';
  const avg=ms/daysPassed();
  if(ms+avg*dl>=minT)return '<span class="arr-mid">→</span>';
  return '<span class="arr-dn">↓</span>';
}

// ── HESABAT CƏDVƏL — HƏR PERIOD YANINDA ŞÖBƏ ADLARI ──────────────────────────
function buildTable(all,tblId,ldId){
  const stores=gS().filter(s=>s.type==='store');
  const targets=gT();
  const dl=dLeft();

  // Hər şöbə üçün hər period-dakı məlumatı tap
  // Period store key-ləri
  const periodKeys=PERIODS.map(p=>getPeriodStoreKey(p));
  const data={};
  stores.forEach(s=>{data[s.name]={};PERIODS.forEach((p,i)=>{
    const found=all.find(r=>r.sobe===s.name&&r.period===periodKeys[i]);
    data[s.name][p]=found||null;
  });});

  const tbl=document.getElementById(tblId);
  const pandaStores=stores.filter(s=>s.inTotal);
  const saxaStores=stores.filter(s=>!s.inTotal);

  // ── BAŞLIQ SƏTİRİ 1 ──
  // Format: [Şöbələr | Period1 colspan=3 | Şöbələr | Period2 colspan=3 | ...]
  let h=`<tr class="gh">`;
  PERIODS.forEach((p,i)=>{
    h+=`<th class="lb" rowspan="2" style="vertical-align:middle;min-width:105px">Şöbələr</th>`;
    h+=`<th colspan="3" class="${HC[i]}">${getPeriodLabel(p)}</th>`;
  });
  h+=`</tr><tr class="sh">`;
  PERIODS.forEach((p,i)=>{
    h+=`<th class="${SC[i]}">Satış</th><th class="${SC[i]}">Mənfəət</th><th class="${SC[i]}">Faiz</th>`;
  });
  h+=`</tr>`;

  const tots=PERIODS.map(()=>({s:0,m:0,faizler:[]}));

  // ── PANDA ŞÖBƏLƏRİ ──
  pandaStores.forEach(store=>{
    const t=targets[store.id];
    const ds=data[store.name]?.['gunluk']?.satis||0;
    const ms=data[store.name]?.['cari_ay']?.satis||0;
    h+=`<tr class="dr">`;
    PERIODS.forEach((period,pi)=>{
      h+=`<td class="nm">${store.name}</td>`;
      const e=data[store.name]?.[period];
      if(e&&(e.satis>0||e.menfeet>0)){
        let arrow='';
        if(period==='gunluk'&&t) arrow=arrowDaily(ds,ms,t.min,dl);
        else if(period==='cari_ay'&&t) arrow=arrowMonthly(ms,t.min,dl);
        let faizTd;
        if(period==='cari_ay'&&t){
          const p=exactPct(e.satis,t.min);
          faizTd=`<td class="pv ${pctCls(p)}">${pctStr(p)}</td>`;
        }else{
          faizTd=`<td class="pv">${e.faiz&&e.faiz>0?e.faiz.toFixed(1)+'%':'—'}</td>`;
        }
        h+=`<td class="nv">${arrow}${fmt(e.satis)}</td><td class="nv">${fmt(e.menfeet)}</td>${faizTd}`;
        tots[pi].s+=e.satis;tots[pi].m+=e.menfeet;
        if(e.faiz>0)tots[pi].faizler.push(e.faiz);
      }else{
        h+=`<td class="dsh">—</td><td class="dsh">—</td><td class="dsh">—</td>`;
      }
    });
    h+=`</tr>`;
  });

  // ── ÜMUMİ PANDA ──
  h+=`<tr class="tr">`;
  tots.forEach((t,pi)=>{
    const avgF=simplAvgPct(t.faizler);
    h+=`<td class="nm">Ümumi Panda</td>`;
    h+=`<td class="nv">${t.s>0?fmt(t.s):'—'}</td>`;
    h+=`<td class="nv">${t.m>0?fmt(t.m):'—'}</td>`;
    h+=`<td class="pv">${fmtPct(avgF)}</td>`;
  });
  h+=`</tr>`;

  // ── SAXA — böyük boşluq ──
  if(saxaStores.length>0){
    const colCount=PERIODS.length*4;
    h+=`<tr class="saxa-gap"><td colspan="${colCount}"></td></tr>`;
    saxaStores.forEach(store=>{
      const t=targets[store.id];
      const ds=data[store.name]?.['gunluk']?.satis||0;
      const ms=data[store.name]?.['cari_ay']?.satis||0;
      h+=`<tr class="sr">`;
      PERIODS.forEach((period,pi)=>{
        h+=`<td class="nm">${store.name}</td>`;
        if(pi>=2){
          h+=`<td class="dsh">—</td><td class="dsh">—</td><td class="dsh">—</td>`;
        }else{
          const e=data[store.name]?.[period];
          if(e&&(e.satis>0||e.menfeet>0)){
            let arrow='';
            if(period==='gunluk'&&t) arrow=arrowDaily(ds,ms,t.min,dl);
            else if(period==='cari_ay'&&t) arrow=arrowMonthly(ms,t.min,dl);
            let faizTd;
            if(period==='cari_ay'&&t){
              const p=exactPct(e.satis,t.min);
              faizTd=`<td class="pv ${pctCls(p)}">${pctStr(p)}</td>`;
            }else{
              faizTd=`<td class="pv">${e.faiz&&e.faiz>0?e.faiz.toFixed(1)+'%':'—'}</td>`;
            }
            h+=`<td class="nv">${arrow}${fmt(e.satis)}</td><td class="nv">${fmt(e.menfeet)}</td>${faizTd}`;
          }else{
            h+=`<td class="dsh">—</td><td class="dsh">—</td><td class="dsh">—</td>`;
          }
        }
      });
      h+=`</tr>`;
    });
  }

  tbl.innerHTML=h;
  document.getElementById(ldId).style.display='none';
  tbl.style.display='table';
}

// Plan paneli (admin + viewer üçün)
function buildPlanPanel(all){
  const stores=gS().filter(s=>s.type==='store'&&s.showPlan);
  const targets=gT();
  const dl=dLeft();
  const periodKey=getPeriodStoreKey('cari_ay');
  const dailyKey=getPeriodStoreKey('gunluk');
  if(!stores.length)return '<div style="color:rgba(255,255,255,.4);font-size:12px;padding:10px">Plan göstəriləcək şöbə yoxdur</div>';
  let h='<div class="plan-store-grid">';
  stores.forEach(store=>{
    const t=targets[store.id];if(!t)return;
    const mEntry=all.find(r=>r.sobe===store.name&&r.period===periodKey);
    const dEntry=all.find(r=>r.sobe===store.name&&r.period===dailyKey);
    const ms=mEntry?.satis||0,tv=dEntry?.satis||0;
    let at,rm;
    if(ms<t.min){at=t.min;rm=t.min-ms;}
    else if(ms<t.mid){at=t.mid;rm=t.mid-ms;}
    else if(ms<t.max){at=t.max;rm=t.max-ms;}
    else{at=t.max;rm=0;}
    const ap=exactPct(ms,at)||0;
    const dn=dl>0&&rm>0?Math.ceil(rm/dl):0;
    const bc=ms>=t.max?'#10b981':ms>=t.mid?'#3b82f6':ms>=t.min?'#f59e0b':'#ef4444';
    const apStr=ap===100?'100%':ap.toFixed(1)+'%';
    const isSaxa=!store.inTotal;
    h+=`<div class="plan-store-item" style="${isSaxa?'border-left:3px solid #f59e0b':''}">
      <div class="psi-header">
        <div class="psi-name">${store.name}${isSaxa?' <span style="font-size:8px;color:#f59e0b">(filial)</span>':''}</div>
        <div class="psi-pct" style="color:${bc}">${apStr}</div>
      </div>
      <div class="psi-bar-wrap"><div class="psi-bar" style="width:${Math.min(100,ap)}%;background:${bc}"></div></div>
      <div class="psi-stats">
        <div class="psi-stat">Cari: <span>${fmt(ms)} ₼</span></div>
        <div class="psi-stat">Hədəf: <span>${fmt(at)} ₼</span></div>
        ${rm>0?`<div class="psi-stat">Gündəlik: <span>${fmt(dn)} ₼</span></div>`:'<div class="psi-stat" style="color:#10b981">✅</div>'}
        <div class="psi-stat">Bu gün: <span>${fmt(tv)} ₼</span></div>
      </div>
    </div>`;
  });
  h+='</div>';
  return h;
}

let screenshotTarget='rc';
async function takeScreenshot(id){
  screenshotTarget=id||'rc';
  const card=document.getElementById(screenshotTarget);
  const tblW=card.querySelector('.rc-tbl-w');
  const origOF=tblW.style.overflow,origW=tblW.style.width;
  tblW.style.overflow='visible';tblW.style.width=tblW.scrollWidth+'px';
  try{
    const canvas=await html2canvas(card,{backgroundColor:'#ffffff',scale:3,useCORS:true,logging:false,width:card.scrollWidth,windowWidth:card.scrollWidth+40,imageTimeout:0,allowTaint:false});
    prevUrl=canvas.toDataURL('image/png',1.0);
    document.getElementById('prev-img').src=prevUrl;
    document.getElementById('img-ov').classList.add('show');
  }catch(e){alert('Şəkil alınmadı.');}
  finally{tblW.style.overflow=origOF;tblW.style.width=origW;}
}
