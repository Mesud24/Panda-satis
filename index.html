<!DOCTYPE html><html lang="az"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Panda Kids Satış Sistemi</title><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"><style>:root{--bg:#f2f2ee;--card:#fff;--navy:#1a2740;--gold:#c9963a;--border:#e0dfd8;--muted:#888880;--text:#1a1a1a;--blue:#2E75B6;--orange:#C55A11;--green:#375623;--purple:#7030A0;--blue-l:#d0e4f5;--orange-l:#fce0cc;--green-l:#d4edcc;--purple-l:#e8d4f5;--row-alt:#f8f8f5;--total-bg:#e4e4de;}*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}.screen{display:none;min-height:100vh;flex-direction:column;}.screen.active{display:flex;}#gate{background:var(--navy);align-items:center;justify-content:center;}.gate-wrap{width:100%;max-width:380px;padding:40px 28px;display:flex;flex-direction:column;gap:18px;align-items:center;}.gate-logo{width:120px;height:120px;object-fit:contain;border-radius:16px;background:#fff;padding:8px;box-shadow:0 4px 20px rgba(0,0,0,.3);}.gate-title{font-size:20px;font-weight:700;color:#fff;text-align:center;margin-top:-6px;}.gate-sub{font-size:13px;color:rgba(255,255,255,.4);text-align:center;margin-top:-10px;}.gate-label{width:100%;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.4);margin-bottom:-10px;}.gate-input{width:100%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:12px;padding:13px 18px;font-family:inherit;font-size:15px;color:#fff;outline:none;}.gate-input:focus{border-color:var(--gold);}.gate-input.pw{letter-spacing:5px;font-size:18px;}.gate-input.pw::placeholder{letter-spacing:1px;font-size:14px;}select.gate-input{appearance:none;cursor:pointer;}select.gate-input option{color:#000;background:#fff;}.gate-btn{width:100%;padding:14px;background:var(--gold);border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;color:#fff;cursor:pointer;}.gate-err{color:#fca5a5;font-size:13px;display:none;text-align:center;}.gate-err.show{display:block;}.gate-divider{width:100%;height:1px;background:rgba(255,255,255,.1);}.gate-admin-link{color:rgba(255,255,255,.35);font-size:12px;cursor:pointer;background:none;border:none;font-family:inherit;}#store-form{background:var(--bg);}.sf-header{background:var(--navy);padding:16px 24px 22px;}.sf-header-inner{max-width:680px;margin:0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}.sf-header-logo{width:44px;height:44px;object-fit:contain;background:#fff;border-radius:10px;padding:4px;}.sf-header-text{flex:1;}.back-btn{background:none;border:none;color:rgba(255,255,255,.45);font-family:inherit;font-size:13px;cursor:pointer;padding:0;margin-bottom:6px;display:flex;align-items:center;gap:5px;}.sf-title{font-size:18px;font-weight:700;color:#fff;}.sf-date{font-size:12px;color:var(--gold);margin-top:2px;}.sf-body{max-width:680px;margin:0 auto;padding:24px;flex:1;}.period-block{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;}.period-header{padding:11px 16px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#fff;}.period-table{width:100%;border-collapse:collapse;}.period-table thead th{padding:9px 14px;font-size:11px;font-weight:600;text-transform:uppercase;color:#555;background:#f8f8f5;text-align:right;}.period-table thead th:first-child{text-align:left;}.period-table tbody tr{border-top:1px solid var(--border);}.period-table tbody td{padding:10px 14px;}.period-table tbody td.pname{font-weight:600;font-size:14px;color:var(--navy);}.num-inp{width:100%;text-align:right;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--text);background:#fff;outline:none;}.num-inp:focus{border-color:var(--gold);}.num-inp:disabled{background:var(--row-alt);color:var(--muted);cursor:not-allowed;}.sf-save-btn{width:100%;padding:15px;background:var(--navy);border:none;border-radius:12px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}.sf-save-btn:disabled{opacity:.5;cursor:not-allowed;}.edit-btn{width:100%;padding:12px;background:transparent;border:1.5px solid var(--navy);border-radius:12px;color:var(--navy);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}.success-box{display:none;background:#dcfce7;border:1.5px solid #86efac;border-radius:12px;padding:14px 18px;color:#15803d;font-size:14px;margin-top:12px;}.success-box.show{display:block;}.loading-box{display:none;background:#dbeafe;border:1.5px solid #93c5fd;border-radius:12px;padding:14px 18px;color:#1d4ed8;font-size:14px;margin-top:12px;}.loading-box.show{display:block;}.error-box{display:none;background:#fee2e2;border:1.5px solid #fca5a5;border-radius:12px;padding:14px 18px;color:#dc2626;font-size:14px;margin-top:12px;}.error-box.show{display:block;}#admin{background:#e8e8e8;}.adm-header{background:var(--navy);padding:16px 24px 22px;}.adm-header-inner{max-width:1300px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}.adm-logo-wrap{display:flex;align-items:center;gap:14px;}.adm-logo{width:48px;height:48px;object-fit:contain;background:#fff;border-radius:10px;padding:4px;}.adm-title h2{font-size:18px;font-weight:700;color:#fff;}.adm-title p{font-size:12px;color:var(--gold);margin-top:3px;}.adm-actions{display:flex;gap:10px;align-items:center;}.refresh-btn{background:rgba(201,150,58,.2);border:1px solid rgba(201,150,58,.4);color:var(--gold);border-radius:9px;padding:8px 14px;font-family:inherit;font-size:13px;cursor:pointer;}.adm-body{max-width:1300px;margin:16px auto;padding:0 16px 40px;overflow-x:auto;}
.excel-outer{background:#fff;border:2px solid #999;min-width:960px;}
.excel-table{width:100%;border-collapse:collapse;font-size:11px;font-family:Arial,sans-serif;}
.excel-table td,.excel-table th{border:1px solid #c0c0c0;padding:3px 6px;white-space:nowrap;}
.excel-table .rh1 th{height:26px;font-weight:700;color:#fff;text-align:center;vertical-align:middle;font-size:11px;}
.excel-table .rh1 .lbl{background:#2d3748;color:#fff;text-align:left;font-size:10px;border-right:2px solid #999;}
.excel-table .rh2 th{height:20px;font-weight:600;text-align:center;vertical-align:middle;font-size:10px;}
.excel-table .rh2 .lbl{background:#4a5568;color:#fff;text-align:left;font-size:10px;border-right:2px solid #999;}
.excel-table .dr td{height:20px;vertical-align:middle;}
.excel-table .dr .nm{font-weight:700;background:#f7f7f7;border-right:2px solid #999;}
.excel-table .dr .nv{text-align:right;}
.excel-table .dr .pv{text-align:right;color:#444;}
.excel-table .dr .dsh{text-align:center;color:#bbb;}
.excel-table .dr:nth-child(even) td{background:#f0f4f8;}
.excel-table .dr:nth-child(even) .nm{background:#e8edf2;}
.excel-table .tr td{height:24px;font-weight:700;background:#d0d8e4;border-top:2px solid #888;vertical-align:middle;}
.excel-table .tr .nm{border-right:2px solid #999;}
.excel-table .tr .nv{text-align:right;}
.excel-table .tr .pv{text-align:right;}
.hb{background:#2E75B6;}.ho{background:#C55A11;}.hg{background:#375623;}.hp{background:#7030A0;}
.sb{background:#BDD7EE;color:#000!important;}.so{background:#F4B183;color:#000!important;}.sg{background:#A9D18E;color:#000!important;}.sp{background:#C5A3E0;color:#000!important;}
.adm-loading{text-align:center;padding:40px;color:var(--muted);font-size:14px;}
</style></head><body>
<div class="screen active" id="gate"><div class="gate-wrap"><img class="gate-logo" src="IMG_0510.png" alt="Panda Kids"><div class="gate-title">Panda Kids Satış Sistemi</div><div class="gate-sub">Daxil olmaq üçün şöbənizi seçin</div><div class="gate-label">Şöbə</div><select class="gate-input" id="gate-store"><option value="">— Seçin —</option></select><div class="gate-label">Şifrə</div><input class="gate-input pw" type="password" id="gate-pw" placeholder="••••" onkeydown="if(event.key==='Enter')doLogin()"><button class="gate-btn" onclick="doLogin()">Daxil ol →</button><div class="gate-err" id="gate-err">Şifrə yanlışdır</div><div class="gate-divider"></div><button class="gate-admin-link" onclick="showAdminGate()">Admin paneli →</button></div></div>
<div class="screen" id="store-form"><div class="sf-header"><div class="sf-header-inner"><img class="sf-header-logo" src="IMG_0510.png" alt="Panda Kids"><div class="sf-header-text"><button class="back-btn" onclick="logout()">← Çıxış</button><div class="sf-title" id="sf-title"></div><div class="sf-date" id="sf-date"></div></div></div></div><div class="sf-body" id="sf-body"></div></div>
<div class="screen" id="admin"><div class="adm-header"><div class="adm-header-inner"><div class="adm-logo-wrap"><img class="adm-logo" src="IMG_0510.png" alt="Panda Kids"><div class="adm-title"><h2>Panda Kids — Yekun Satış Hesabatı</h2><p id="adm-date"></p></div></div><div class="adm-actions"><button class="refresh-btn" onclick="loadAdminData()">↻ Yenilə</button><button class="back-btn" style="color:rgba(255,255,255,.45);margin:0" onclick="logout()">← Çıxış</button></div></div></div><div class="adm-body"><div class="excel-outer"><div class="adm-loading" id="adm-loading">Məlumatlar yüklənir...</div><table class="excel-table" id="report-tbl" style="display:none"></table></div></div></div>
<script>
const BIN_ID="69c115d4b7ec241ddc949a2c";
const API_KEY="$2a$10$FKtiGhR30Uu6WoutSaNJne5SvTJFLM8mr2ZdCj50f1RLbD6tWAX7K";
const BIN_URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`;
const ADMIN_PW="admin2026";
const STORES=[{id:"panda2",name:"Panda 2",pw:"p2-2026"},{id:"panda3",name:"Panda 3",pw:"p3-2026"},{id:"pandaexp",name:"Panda Express",pw:"pe-2026"},{id:"saxa1",name:"Saxa 1 (Əcəmi)",pw:"s1-2026"},{id:"saxa2",name:"Saxa 2 (Xırdalan)",pw:"s2-2026"}];
const SAXA_IDS=["saxa1","saxa2"];
const PERIODS=["gunluk","ay2026","ay2025","ay2024"];
const HDR_CLS=["hb","ho","hg","hp"];
const SUB_CLS=["sb","so","sg","sp"];
const PERIOD_COLORS=["var(--blue)","var(--orange)","var(--green)","var(--purple)"];
let currentStoreId=null;
let editMode=false;

function getPeriodLabel(p){
  const d=new Date();
  if(d.getHours()<17)d.setDate(d.getDate()-1);
  const day=d.getDate();
  const month="mart";
  const year=d.getFullYear();
  const labels={"gunluk":`${day} ${month} ${year}`,"ay2026":`1-${day} ${month} 2026`,"ay2025":`1-${day} ${month} 2025`,"ay2024":`1-${day} ${month} 2024`};
  return labels[p]||p;
}

function todayKey(){
  const d=new Date();
  if(d.getHours()<17)d.setDate(d.getDate()-1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

(function(){const sel=document.getElementById('gate-store');STORES.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.name;sel.appendChild(o);});})();
function fmt(n){if(!n||n==0)return '-';return Number(n).toLocaleString('az-AZ',{minimumFractionDigits:0,maximumFractionDigits:0});}
function formatDate(){
  const d=new Date();
  if(d.getHours()<17)d.setDate(d.getDate()-1);
  return d.toLocaleDateString('az-AZ',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function cacheKey(s,p){return `panda3_${s}_${p}_${todayKey()}`;}
function getCached(s,p){try{return JSON.parse(localStorage.getItem(cacheKey(s,p))||'null');}catch{return null;}}
function setCached(s,p,d){localStorage.setItem(cacheKey(s,p),JSON.stringify(d));}
function clearCache(s){PERIODS.forEach(p=>localStorage.removeItem(cacheKey(s,p)));}
function goTo(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function logout(){currentStoreId=null;editMode=false;document.getElementById('gate-pw').value='';document.getElementById('gate-err').classList.remove('show');document.getElementById('gate-store').value='';goTo('gate');}
function doLogin(){const sid=document.getElementById('gate-store').value;const pw=document.getElementById('gate-pw').value;if(!sid){alert('Zəhmət olmasa şöbəni seçin.');return;}const store=STORES.find(s=>s.id===sid);if(!store||pw!==store.pw){document.getElementById('gate-err').classList.add('show');document.getElementById('gate-pw').value='';return;}document.getElementById('gate-err').classList.remove('show');currentStoreId=sid;editMode=false;openStoreForm(sid);}
function showAdminGate(){const pw=prompt('Admin şifrəsi:');if(pw===ADMIN_PW){openAdmin();}else if(pw!==null){alert('Şifrə yanlışdır.');}}

function openStoreForm(storeId){
  const store=STORES.find(s=>s.id===storeId);
  const isSaxa=SAXA_IDS.includes(storeId);
  const periods=isSaxa?["gunluk","ay2026"]:PERIODS;
  document.getElementById('sf-title').textContent=store.name;
  document.getElementById('sf-date').textContent=formatDate();
  const body=document.getElementById('sf-body');
  const allSaved=!editMode&&periods.every(p=>getCached(storeId,p)!==null);
  let html='';
  periods.forEach((period,pi)=>{
    const saved=editMode?null:getCached(storeId,period);
    const cachedVal=getCached(storeId,period);
    const dis=(!editMode&&saved)?'disabled':'';
    const satisVal=editMode&&cachedVal?cachedVal.satis:(saved?.satis??'');
    const menfeetVal=editMode&&cachedVal?cachedVal.menfeet:(saved?.menfeet??'');
    const faizVal=editMode&&cachedVal?cachedVal.faiz:(saved?.faiz??'');
    html+=`<div class="period-block"><div class="period-header" style="background:${PERIOD_COLORS[PERIODS.indexOf(period)]}">${getPeriodLabel(period)}</div><table class="period-table"><thead><tr><th style="text-align:left">Göstərici</th><th>Satış Məbləği (₼)</th><th>Mənfəət (₼)</th><th>Faiz (%)</th></tr></thead><tbody><tr><td class="pname">Ümumi satış</td><td><input class="num-inp" type="number" min="0" step="0.01" id="satis-${period}" value="${satisVal}" placeholder="0.00" ${dis}></td><td><input class="num-inp" type="number" min="0" step="0.01" id="menfeet-${period}" value="${menfeetVal}" placeholder="0.00" ${dis}></td><td><input class="num-inp" type="number" min="0" step="0.1" id="faiz-${period}" value="${faizVal}" placeholder="0.0" ${dis}></td></tr></tbody></table></div>`;
  });
  if(allSaved){
    html+=`<button class="sf-save-btn" disabled>✓ Saxlanıldı</button>
    <button class="edit-btn" onclick="enableEdit()">✏️ Redakt et</button>
    <div class="success-box show" id="sf-success">✅ Bu günün məlumatları saxlanıldı.</div>`;
  } else {
    html+=`<button class="sf-save-btn" id="sf-save-btn" onclick="submitStore()">✓ Yadda Saxla</button>
    <div class="loading-box" id="sf-loading">⏳ Göndərilir...</div>
    <div class="success-box" id="sf-success">✅ Məlumatlar uğurla saxlandı!</div>
    <div class="error-box" id="sf-error">❌ Xəta baş verdi. Yenidən cəhd edin.</div>`;
  }
  body.innerHTML=html;
  goTo('store-form');
}

function enableEdit(){
  editMode=true;
  openStoreForm(currentStoreId);
}

async function readBin(){
  try{
    const res=await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY,'X-Bin-Meta':'false'}});
    if(!res.ok)return[];
    const json=await res.json();
    return json.data||[];
  }catch(e){return[];}
}

async function writeBin(data){
  try{
    await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY,'X-Bin-Meta':'false'},body:JSON.stringify({data})});
  }catch(e){console.error(e);}
}

async function submitStore(){
  const storeId=currentStoreId;
  const store=STORES.find(s=>s.id===storeId);
  const isSaxa=SAXA_IDS.includes(storeId);
  const periods=isSaxa?["gunluk","ay2026"]:PERIODS;
  const results={};let anyData=false;
  for(const p of periods){
    const s=parseFloat(document.getElementById(`satis-${p}`)?.value)||0;
    const m=parseFloat(document.getElementById(`menfeet-${p}`)?.value)||0;
    const f=parseFloat(document.getElementById(`faiz-${p}`)?.value)||0;
    if(s>0||m>0||f>0)anyData=true;
    results[p]={satis:s,menfeet:m,faiz:f};
  }
  if(!anyData){alert('Ən azı bir rəqəm daxil edin.');return;}
  document.getElementById('sf-save-btn').disabled=true;
  document.getElementById('sf-loading').classList.add('show');
  document.getElementById('sf-error').classList.remove('show');
  try{
    const today=todayKey();
    // Only keep today's data — old days removed
    const allData=await readBin();
    const filtered=allData.filter(r=>r.tarix===today);
    for(const p of periods){
      const d=results[p];
      const idx=filtered.findIndex(r=>r.sobe===store.name&&r.period===p);
      const entry={tarix:today,sobe:store.name,period:p,satis:d.satis,menfeet:d.menfeet,faiz:d.faiz};
      if(idx>=0){filtered[idx]=entry;}else{filtered.push(entry);}
      setCached(storeId,p,d);
    }
    await writeBin(filtered);
    editMode=false;
    document.getElementById('sf-loading').classList.remove('show');
    document.getElementById('sf-success').classList.add('show');
    document.getElementById('sf-save-btn').textContent='✓ Saxlanıldı';
    document.querySelectorAll('.num-inp').forEach(i=>i.disabled=true);
  }catch(err){
    document.getElementById('sf-loading').classList.remove('show');
    document.getElementById('sf-error').classList.add('show');
    document.getElementById('sf-save-btn').disabled=false;
  }
}

function openAdmin(){document.getElementById('adm-date').textContent=formatDate();goTo('admin');loadAdminData();}

async function loadAdminData(){
  document.getElementById('adm-loading').style.display='block';
  document.getElementById('report-tbl').style.display='none';
  try{
    const allData=await readBin();
    buildReport(allData);
  }catch(e){document.getElementById('adm-loading').textContent='❌ Məlumatlar yüklənmədi.';}
}

function buildReport(allData){
  const today=todayKey();
  const rows=allData.filter(r=>r.tarix===today);
  const data={};
  STORES.forEach(s=>{data[s.name]={};PERIODS.forEach(p=>{data[s.name][p]=null;});});
  rows.forEach(r=>{if(data[r.sobe]!==undefined&&r.period){data[r.sobe][r.period]={satis:r.satis,menfeet:r.menfeet,faiz:r.faiz};}});
  const tbl=document.getElementById('report-tbl');
  let html=`<tr class="rh1">`;
  PERIODS.forEach((p,i)=>{html+=`<th class="lbl">Şöbələr</th><th colspan="3" class="${HDR_CLS[i]}">${getPeriodLabel(p)}</th>`;});
  html+=`</tr><tr class="rh2">`;
  PERIODS.forEach((p,i)=>{html+=`<th class="lbl"></th><th class="${SUB_CLS[i]}">Satış məbləği</th><th class="${SUB_CLS[i]}">Mənfəət</th><th class="${SUB_CLS[i]}">Faiz</th>`;});
  html+=`</tr>`;
  const totals=PERIODS.map(()=>({s:0,m:0,count:0}));
  STORES.forEach(store=>{
    const isSaxa=SAXA_IDS.includes(store.id);
    html+=`<tr class="dr">`;
    PERIODS.forEach((period,pi)=>{
      html+=`<td class="nm">${store.name}</td>`;
      if(isSaxa&&(period==='ay2025'||period==='ay2024')){
        html+=`<td class="dsh">—</td><td class="dsh">—</td><td class="dsh">—</td>`;
      }else{
        const e=data[store.name]?.[period];
        if(e&&(e.satis>0||e.menfeet>0||e.faiz>0)){
          html+=`<td class="nv">${fmt(e.satis)}</td><td class="nv">${fmt(e.menfeet)}</td><td class="pv">${e.faiz?e.faiz+'%':'—'}</td>`;
          if(!isSaxa){totals[pi].s+=e.satis;totals[pi].m+=e.menfeet;totals[pi].count++;}
        }else{
          html+=`<td class="dsh">—</td><td class="dsh">—</td><td class="dsh">—</td>`;
        }
      }
    });
    html+=`</tr>`;
  });
  html+=`<tr class="tr">`;
  PERIODS.forEach((p,pi)=>{
    const t=totals[pi];
    const pct=t.s>0?Math.round(t.m/t.s*100)+'%':'—';
    html+=`<td class="nm">Ümumi Panda</td><td class="nv">${t.count?fmt(t.s):'—'}</td><td class="nv">${t.count?fmt(t.m):'—'}</td><td class="pv">${t.count?pct:'—'}</td>`;
  });
  html+=`</tr>`;
  tbl.innerHTML=html;
  document.getElementById('adm-loading').style.display='none';
  tbl.style.display='table';
}
</script></body></html>
